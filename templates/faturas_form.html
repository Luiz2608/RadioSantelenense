{% extends 'base.html' %}
{% block content %}
<h2>Nova Fatura</h2>
<form method="post" class="form-grid">
  <label>Contrato</label>
  <select name="contrato" required>
    {% for c in contratos %}
    <option value="{{ c.id }}">#{{ c.id }} • {{ c.client.nome_fantasia }} • {{ c.vendor.nome }}</option>
    {% endfor %}
  </select>
  <label>Data de vencimento</label><input type="date" name="vencimento" required>
  <label>Valor</label><input type="number" step="0.01" name="valor" required>
  <label>Status</label>
  <select name="status" required>
    <option value="pendente">pendente</option>
    <option value="pago">pago</option>
  </select>
  <label>Forma de pagamento</label>
  <select name="forma_pagamento" required>
    <option value="pix">pix</option>
    <option value="dinheiro">dinheiro</option>
    <option value="cartao">cartão</option>
    <option value="boleto">boleto</option>
    <option value="cheque">cheque</option>
  </select>
  <button type="submit" class="btn">Salvar</button>
  <a href="{{ url_for('faturas') }}" class="btn secondary">Cancelar</a>
{% endblock %}
