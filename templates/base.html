<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Santelenense</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">Radio Santelenense</div>
    {% if g.user %}
    <div class="user">Perfil: {{ g.user.role }} • {{ g.user.username }} <a class="logout" href="{{ url_for('logout') }}">Sair</a></div>
    {% endif %}
  </header>
  {% if g.user %}
  <nav class="navbar">
    <a href="{{ url_for('index') }}">Notificações</a>
    <a href="{{ url_for('clientes') }}">Clientes</a>
    <a href="{{ url_for('vendedores') }}">Vendedores</a>
    <a href="{{ url_for('contratos') }}">Contratos</a>
    <a href="{{ url_for('faturas') }}">Faturas</a>
    {% if g.user.role == 'direcao' %}
    <a href="{{ url_for('relatorios') }}">Relatórios</a>
    {% endif %}
  </nav>
  {% endif %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
