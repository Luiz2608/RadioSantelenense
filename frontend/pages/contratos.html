<div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
  <div>
    <div class="h5 mb-0">Contratos</div>
    <div class="text-secondary small">Cadastro e acompanhamento</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-danger" id="btnNovoContrato">
      <span data-lucide="plus" class="icon"></span>
      Novo Contrato
    </button>
  </div>
</div>

<div class="card card-saas mt-3">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Vendedor</th>
            <th>Início</th>
            <th>Término</th>
            <th>Tipo</th>
            <th>Período</th>
            <th class="text-end d-none" id="contratosAcoesTh">Ações</th>
          </tr>
        </thead>
        <tbody id="contratosTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalContrato" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header">
        <div>
          <div class="h5 mb-0" id="contratoModalTitle">Novo Contrato</div>
          <div class="text-secondary small">Detalhes do contrato</div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formContrato" class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Cliente</label>
            <select class="form-select" name="clientId" id="contratoClienteSelect" required></select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Vendedor responsável</label>
            <select class="form-select" name="vendorId" id="contratoVendedorSelect" required></select>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Data de início</label>
            <input type="date" class="form-control" name="startDate" required />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Data de término</label>
            <input type="date" class="form-control" name="endDate" required />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Inserções/dia</label>
            <input type="number" min="0" class="form-control" name="insercoesPorDia" />
          </div>
          <div class="col-12">
            <label class="form-label">Horários de veiculação</label>
            <input class="form-control" name="horarios" placeholder="07:30, 12:00, 18:45" />
          </div>
          <div class="col-12">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" name="descricao" rows="3"></textarea>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Tipo</label>
            <select class="form-select" name="tipo" required>
              <option value="permuta">permuta</option>
              <option value="pos-pago">pós-pago</option>
              <option value="pre-pago">pré-pago</option>
              <option value="cheque">cheque</option>
            </select>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Período total (calculado)</label>
            <input class="form-control" name="periodoTotal" id="contratoPeriodoTotal" disabled />
          </div>
        </form>
        <div class="alert alert-danger mt-3 d-none" id="contratoErro">Não foi possível salvar.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="salvarContrato">Salvar</button>
      </div>
    </div>
  </div>
</div>
