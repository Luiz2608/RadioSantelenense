<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Radio Santelenense • Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar d-none d-lg-flex">
        <div class="sidebar-header">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">Radio Santelenense</div>
            <div class="brand-subtitle">Gestão Financeira</div>
          </div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
          <div class="small text-secondary">Tema vermelho &amp; branco</div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-light d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileNav">
              <span data-lucide="menu" class="icon"></span>
            </button>
            <div>
              <div class="page-title" id="pageTitle">Dashboard</div>
              <div class="page-subtitle" id="pageSubtitle">Notificações e visão geral</div>
            </div>
          </div>

          <div class="d-flex align-items-center gap-3">
            <div class="user-pill">
              <span data-lucide="user" class="icon"></span>
              <div class="d-flex flex-column lh-sm">
                <div class="user-name" id="userName">—</div>
                <div class="user-role" id="userRole">—</div>
              </div>
            </div>
            <button class="btn btn-outline-danger btn-sm" id="logoutBtn">
              <span data-lucide="log-out" class="icon"></span>
              Sair
            </button>
          </div>
        </header>

        <main class="content">
          <div id="pageRoot" class="page-wrap"></div>
        </main>
      </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileNav">
      <div class="offcanvas-header">
        <div class="d-flex align-items-center gap-2">
          <div class="brand-mark"></div>
          <div>
            <div class="brand-title">Radio Santelenense</div>
            <div class="brand-subtitle">Gestão Financeira</div>
          </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <nav class="sidebar-nav" id="mobileSidebarNav"></nav>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <script>
      window.RS_SUPABASE_URL = "https://aohpkqyxihkyzkjwfjjm.supabase.co"
      window.RS_SUPABASE_ANON_KEY = ""
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/mock-data.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
