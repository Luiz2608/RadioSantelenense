<div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
  <div>
    <div class="h5 mb-0">Clientes</div>
    <div class="text-secondary small">Cadastro e consulta</div>
  </div>
  <div class="d-flex gap-2">
    <div class="input-group">
      <span class="input-group-text bg-white border-end-0"><span data-lucide="search" class="icon"></span></span>
      <input class="form-control border-start-0" id="clientesBusca" placeholder="Buscar por nome, CNPJ, cidade..." />
    </div>
    <button class="btn btn-danger" id="btnNovoCliente">
      <span data-lucide="plus" class="icon"></span>
      Novo Cliente
    </button>
  </div>
</div>

<div class="card card-saas mt-3">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead>
          <tr>
            <th>Nome Fantasia</th>
            <th>Razão Social</th>
            <th>CNPJ</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th class="text-end d-none" id="clientesAcoesTh">Ações</th>
          </tr>
        </thead>
        <tbody id="clientesTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalCliente" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header">
        <div>
          <div class="h5 mb-0" id="clienteModalTitle">Novo Cliente</div>
          <div class="text-secondary small">Dados cadastrais</div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formCliente" class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label">Razão Social</label>
            <input class="form-control" name="razaoSocial" required />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label">Nome Fantasia</label>
            <input class="form-control" name="nomeFantasia" required />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">CNPJ</label>
            <input class="form-control" name="cnpj" required />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Inscrição Estadual</label>
            <input class="form-control" name="inscricaoEstadual" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Telefone</label>
            <input class="form-control" name="telefone" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Celular</label>
            <input class="form-control" name="celular" />
          </div>
          <div class="col-12 col-md-8">
            <label class="form-label">Endereço (rua, número, complemento)</label>
            <input class="form-control" name="enderecoLinha" placeholder="Rua X, 123, Sala 2" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Bairro</label>
            <input class="form-control" name="bairro" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">Cidade</label>
            <input class="form-control" name="cidade" />
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label">CEP</label>
            <input class="form-control" name="cep" />
          </div>
        </form>
        <div class="alert alert-danger mt-3 d-none" id="clienteErro">Não foi possível salvar.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="salvarCliente">Salvar</button>
      </div>
    </div>
  </div>
</div>
