<div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
  <div>
    <div class="h5 mb-0">Vendedores</div>
    <div class="text-secondary small">Cadastro e vinculação ao usuário</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-danger" id="btnNovoVendedor">
      <span data-lucide="plus" class="icon"></span>
      Novo Vendedor
    </button>
  </div>
</div>

<div class="card card-saas mt-3">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Usuário vinculado</th>
            <th class="text-end d-none" id="vendedoresAcoesTh">Ações</th>
          </tr>
        </thead>
        <tbody id="vendedoresTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalVendedor" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header">
        <div>
          <div class="h5 mb-0" id="vendedorModalTitle">Novo Vendedor</div>
          <div class="text-secondary small">Dados básicos</div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formVendedor" class="row g-3">
          <div class="col-12">
            <label class="form-label">Nome</label>
            <input class="form-control" name="nome" required />
          </div>
          <div class="col-12">
            <label class="form-label">CPF</label>
            <input class="form-control" name="cpf" required />
          </div>
          <div class="col-12">
            <label class="form-label">Vincular ao usuário (opcional)</label>
            <select class="form-select" name="profileId" id="vendedorUserSelect"></select>
          </div>
        </form>
        <div class="alert alert-danger mt-3 d-none" id="vendedorErro">Não foi possível salvar.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="salvarVendedor">Salvar</button>
      </div>
    </div>
  </div>
</div>
