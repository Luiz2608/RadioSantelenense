<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar • Radio Santelenense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="login-bg">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
          <div class="card border-0 shadow-soft rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="d-flex align-items-center gap-2 mb-4">
                <div class="brand-mark"></div>
                <div>
                  <div class="h5 mb-0">Radio Santelenense</div>
                  <div class="text-secondary small">Acesso ao sistema</div>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input class="form-control form-control-lg" id="username" placeholder="ex: nome@dominio.com" autocomplete="username" />
              </div>
              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input class="form-control form-control-lg" id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
              </div>
              <div class="d-grid gap-2">
                <button class="btn btn-danger btn-lg" id="loginBtn">Entrar</button>
                <a class="btn btn-outline-secondary" href="./index.html#/">Entrar sem login (demo)</a>
              </div>
              <div class="mt-4 small text-secondary">
                Contas demo:
                <div class="mt-2">
                  <div><span class="badge text-bg-light">admin</span> senha <span class="badge text-bg-light">admin</span> (direção)</div>
                  <div><span class="badge text-bg-light">secretaria</span> senha <span class="badge text-bg-light">secretaria</span> (secretária)</div>
                  <div><span class="badge text-bg-light">vendedor</span> senha <span class="badge text-bg-light">vendedor</span> (vendedor)</div>
                </div>
              </div>
              <div class="alert alert-danger mt-4 d-none" id="loginError">Credenciais inválidas</div>
            </div>
          </div>
          <div class="text-center small text-white-50 mt-3">Dashboard moderno • GitHub Pages ready</div>
        </div>
      </div>
    </div>

    <script src="./js/mock-data.js"></script>
    <script>
      window.RS_SUPABASE_URL = "https://aohpkqyxihkyzkjwfjjm.supabase.co"
      window.RS_SUPABASE_ANON_KEY = ""
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/store.js"></script>
    <script>
      window.MockData?.ensureSeeded?.()
      const btn = document.getElementById("loginBtn")
      btn.addEventListener("click", () => {
        const username = document.getElementById("username").value.trim()
        const password = document.getElementById("password").value
        Promise.resolve(window.StoreAuth.login(username, password)).then((res) => {
          const ok = typeof res === "boolean" ? res : Boolean(res?.ok)
          document.getElementById("loginError").classList.toggle("d-none", ok)
          if (ok) window.location.href = "./index.html#/"
        })
      })
    </script>
  </body>
</html>
