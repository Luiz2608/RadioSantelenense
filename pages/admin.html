<div class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between">
  <div>
    <div class="h5 mb-0">Admin</div>
    <div class="text-secondary small">Gerenciar usuários e permissões</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-danger" id="btnNovoUsuario">
      <span data-lucide="plus" class="icon"></span>
      Novo Usuário
    </button>
  </div>
</div>

<div class="card card-saas mt-3">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover table-striped mb-0">
        <thead>
          <tr>
            <th>Usuário</th>
            <th>Perfil</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="adminUsersTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalUser" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-4 border-0">
      <div class="modal-header">
        <div>
          <div class="h5 mb-0" id="userModalTitle">Novo Usuário</div>
          <div class="text-secondary small">Defina login e perfil</div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formUser" class="row g-3">
          <div class="col-12">
            <label class="form-label">Usuário</label>
            <input class="form-control" id="userUsername" required />
          </div>
          <div class="col-12">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="userPassword" />
          </div>
          <div class="col-12">
            <label class="form-label">Perfil</label>
            <select class="form-select" id="userRoleSelect" required>
              <option value="vendedor">vendedor</option>
              <option value="secretaria">secretária</option>
              <option value="direcao">direção</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="salvarUser">Salvar</button>
      </div>
    </div>
  </div>
</div>
